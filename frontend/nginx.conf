server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SSE streaming — must be before the generic /api/ block ────────────────
    # proxy_buffering MUST be off or tokens sit in nginx buffer until the connection ends.
    # X-Accel-Buffering: no (set by backend) also disables buffering, but being
    # explicit here is more reliable across nginx versions.
    location = /api/ai/chat/stream {
        proxy_pass http://backend:5000/api/ai/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 60s;
    }

    # ── General API proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location = /health {
        proxy_pass http://backend:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxy — xterm.js interactive terminal ───────────────────────
    location /ws/ {
        proxy_pass http://backend:5000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
