services:
  judge0-server:
    image: mrkushalsm/judge0:latest
    container_name: judge0-server
    restart: always
    privileged: true
    ports:
      - "2358:2358"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box_data:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2358/about || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  judge0-worker:
    image: mrkushalsm/judge0:latest
    container_name: judge0-worker
    restart: always
    privileged: true
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - judge0_box_data:/box
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f resque || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  judge0-db:
    image: postgres:16
    container_name: judge0-db
    restart: always
    env_file:
      - ./judge0.conf
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7
    container_name: judge0-redis
    restart: always
    env_file:
      - ./judge0.conf
    command: ["sh", "-c", "docker-entrypoint.sh --appendonly no --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  judge0_db_data:
  judge0_redis_data:
  judge0_box_data: